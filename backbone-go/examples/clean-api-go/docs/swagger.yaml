basePath: /api
definitions:
  handlers.CreateProductRequest:
    properties:
      category:
        example: Electronics
        type: string
      description:
        example: High performance laptop
        type: string
      name:
        example: Laptop Dell XPS 15
        type: string
      price:
        example: 1500
        type: number
      stock:
        example: 50
        type: integer
    type: object
  handlers.CreateProductResponse:
    properties:
      data:
        properties:
          id:
            type: string
        type: object
      message:
        type: string
      status:
        type: string
      status_code:
        type: integer
    type: object
  handlers.ErrorResponse:
    properties:
      error_details:
        additionalProperties: true
        type: object
      message:
        type: string
      status:
        type: string
      status_code:
        type: integer
    type: object
  handlers.GetProductsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/handlers.Product'
        type: array
      message:
        type: string
      pagination:
        properties:
          page:
            type: integer
          page_size:
            type: integer
          total_pages:
            type: integer
          total_records:
            type: integer
        type: object
      status:
        type: string
      status_code:
        type: integer
    type: object
  handlers.Product:
    properties:
      active:
        type: boolean
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
  description: Clean Architecture API Example with Backbone Framework
  license:
    name: MIT
  title: Product API
  version: "1.0"
paths:
  /products:
    get:
      consumes:
      - application/json
      description: Retrieve products with optional filtering, sorting and pagination
      parameters:
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Minimum price filter
        in: query
        name: min_price
        type: number
      - description: Maximum price filter
        in: query
        name: max_price
        type: number
      - description: Filter by stock availability
        in: query
        name: in_stock
        type: boolean
      - description: Search by name pattern
        in: query
        name: name
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      - description: Sort field (default created_at)
        in: query
        name: sort_by
        type: string
      - description: 'Sort order: asc or desc (default desc)'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Products retrieved successfully
          schema:
            $ref: '#/definitions/handlers.GetProductsResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get products with filters
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Create a new product in the system
      parameters:
      - description: Product object
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Product created successfully
          schema:
            $ref: '#/definitions/handlers.CreateProductResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create a new product
      tags:
      - products
schemes:
- http
swagger: "2.0"
